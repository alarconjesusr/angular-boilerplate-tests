<div class="bg-[#0F0F0F] h-screen overflow-auto px-4 [font-family:'Bebas_Neue',sans-serif]">
  <div class="grid grid-cols-[1fr_0.8fr] grid-rows-[0.08fr_1fr_0.3fr] h-screen gap-4">
    <header class="col-span-2 flex items-center justify-between text-2xl pt-4">
      <div class="flex gap-24 items-center text-white">
        <div class="font-medium text-3xl">RexFit</div>
        <div class="flex gap-16 text-sm">
          <button class="hover:text-gray-200 hover:cursor-pointer">ABOUT</button>
          <button class="hover:text-gray-200 hover:cursor-pointer">SCHEDULE</button>
          <button class="hover:text-gray-200 hover:cursor-pointer">STORE</button>
          <button class="hover:text-gray-200 hover:cursor-pointer">CONTACT</button>
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <button class="bg-[#2B2B2B] hover:cursor-pointer px-6 py-2 text-white text-sm rounded-2xl">JOIN OUR TEAM</button>
        <button class="bg-[#2B2B2B] hover:cursor-pointer px-6 py-2 text-white text-sm rounded-2xl">LOGIN</button>
        <button class="bg-[#FDDF00] hover:cursor-pointer w-8 h-8 text-white text-sm rounded-full flex items-center justify-center">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-4 text-[#0F0F0F]"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="bg-white rounded-2xl px-16 py-10">
      <div class="flex flex-col w-3/4 h-full justify-between">
        <div class="flex flex-col gap-8">
          <header class="flex gap-4 items-center">
            <div class="flex items-center">
              <div class="bg-[#0F0F0F] w-4 h-6"></div>
              <div class="bg-[#FCD800] w-4 h-6"></div>
            </div>
            <div class="font-medium text-xl">TIME FOR FITNESS - 24</div>
          </header>
          <div class="text-8xl">OWN YOUR STRENGTH, OWN YOU</div>
        </div>
        <div class="flex items-center justify-between">
          <button class="bg-[#0F0F0F] text-white py-2 px-16 rounded-3xl">START YOUR JOURNEY</button>
          <div class="flex items-center gap-3">
            <img src="assets/img/codebar.avif" alt="" class="w-12" />
            <p class="text-xs">JOURNEY FITNESS EXPERIENCE</p>
          </div>
        </div>
      </div>
    </div>

    <div class="relative bg-white rounded-2xl px-16 py-10">
      <div
        class="absolute inset-0 bg-no-repeat rounded-2xl"
        style="
          background-image: url('https://us.images.westend61.de/0001750568pw/de-cuerpo-entero-de-un-joven-africano-elegante-con-traje-naranja-sobre-fondo-amarillo-modelo-de-moda-en-ropa-casual-elegante-JLPSF21743.jpg');
          background-size: cover;
        "
      ></div>
      <div class="relative z-10 font-medium h-full">
        <div class="absolute top-1 text-white text-3xl font-bold w-64">
          TRAIN ON YOUR OWN TIME, OR LIVE ON FASHION
        </div>
        <div class="absolute bottom-1 w-12 h-10 bg-[#0f0f0f] rounded-full"></div>
      </div>
    </div>

    <div class="bg-[#E8B3AB] rounded-2xl px-16 py-6">
      <div class="flex gap-6">
        <img
          src="https://media.istockphoto.com/id/638756792/es/foto/hermosa-mujer-posando-sobre-fondo-oscuro.jpg?s=612x612&w=0&k=20&c=VDQGuUfLRZBvUDL6NSrRA1ApmpbD_faL_u5ahGZ85jU="
          alt=""
          class="w-30 rounded-2xl"
        />
        <div class="flex flex-col justify-between w-full">
          <div class="flex items-start justify-between text-xs">
            <div>24/7 SUPPORT</div>
            <div class="flex gap-6">
              <div>
                <p>12345 FITNESS AV</p>
                <p>BROOKLYN NY</p>
              </div>
              <div class="w-12 h-10 bg-[#0f0f0f] rounded-full"></div>
            </div>
          </div>
          <div class="text-2xl">CONTACT US & RISE STRONGER</div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl px-16 py-6 flex flex-col gap-6">
      <div class="flex justify-between">
        <div class="flex gap-6">
          <div class="text-5xl">4.98</div>
          <div class="flex flex-col items-center gap-1">
            <div class="flex">
              @for (item of [1, 2, 3, 4, 5]; track $index) {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-6"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"
                  />
                </svg>
              }
            </div>
            <div class="text-xs">RANKING EXPERIENCE</div>
          </div>
        </div>
        <div class="w-12 h-10 bg-[#0f0f0f] rounded-full"></div>
      </div>
      <div class="text-xs flex gap-2 flex-wrap">
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">Ranking</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">BEST team</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">BEST team</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">Ranking</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">BEST team</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">SUPER</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">Ranking</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">
          The exercise of the year
        </button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">BEST team</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">Ranking</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">BEST team</button>
        <button class="border border-gray-400 px-6 py-1 rounded-2xl">SUPER</button>
      </div>
    </div>
  </div>
</div>
